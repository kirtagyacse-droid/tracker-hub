<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tracker Hub - Control Center</title>
  <link rel="icon" href="icon.jpg" type="image/jpeg">
  <link rel="apple-touch-icon" href="icon.jpg">
  
  <!-- Font and Icon libraries -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root {
      --bg-primary: #05020a;
      --accent-pink: #ec2b7a;
      --accent-carnation: #fe7bbf;
      --accent-chartreuse: #ceff32;
      --accent-blue: #00d2ff;
      --glass-bg: rgba(13, 4, 23, 0.45);
      --glass-border: rgba(255, 255, 255, 0.05);
      --text-primary: #f8fafc;
      --text-secondary: #cbd5e1;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: radial-gradient(circle at 50% 0%, #150629 0%, #080312 60%, #030107 100%);
      color: var(--text-primary);
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      overflow-x: hidden;
      position: relative;
      padding: 2rem 1rem;
    }

    /* 3D Background */
    .bg-grid {
      position: absolute;
      inset: 0;
      background-image: 
        linear-gradient(rgba(236, 43, 122, 0.03) 1.5px, transparent 1.5px),
        linear-gradient(90deg, rgba(236, 43, 122, 0.03) 1.5px, transparent 1.5px);
      background-size: 40px 40px;
      z-index: -10;
      mask-image: radial-gradient(circle at 50% 50%, rgba(0,0,0,1) 30%, rgba(0,0,0,0) 80%);
      -webkit-mask-image: radial-gradient(circle at 50% 50%, rgba(0,0,0,1) 30%, rgba(0,0,0,0) 80%);
    }

    /* Glowing Blobs */
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.15;
      pointer-events: none;
      z-index: -5;
    }
    .blob-1 {
      background: radial-gradient(circle, var(--accent-pink) 0%, transparent 75%);
      width: 450px;
      height: 450px;
      top: -10%;
      left: 10%;
    }
    .blob-2 {
      background: radial-gradient(circle, var(--accent-chartreuse) 0%, transparent 75%);
      width: 400px;
      height: 400px;
      bottom: -10%;
      right: 10%;
    }

    /* Main Container */
    .hub-container {
      width: 100%;
      max-width: 800px;
      text-align: center;
      z-index: 10;
    }

    /* Header title */
    .header-section {
      margin-bottom: 3.5rem;
    }

    .header-section h1 {
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, var(--accent-pink) 0%, var(--accent-carnation) 50%, var(--accent-chartreuse) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      display: inline-block;
    }

    .header-section p {
      color: var(--text-secondary);
      font-size: 0.95rem;
      opacity: 0.7;
    }

    /* Launcher Dock */
    .app-dock {
      background: var(--glass-bg);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 1px solid var(--glass-border);
      border-radius: 2rem;
      padding: 2.5rem;
      box-shadow: 
        inset 0 1px 1px rgba(255, 255, 255, 0.05),
        0 25px 50px -12px rgba(0, 0, 0, 0.6);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 2rem;
      position: relative;
    }

    /* Cyber scanner line */
    .app-dock::before {
      content: '';
      position: absolute;
      top: 0;
      left: 10%;
      right: 10%;
      height: 1.5px;
      background: linear-gradient(90deg, transparent, var(--accent-pink), transparent);
      opacity: 0.5;
      animation: scan 4s ease-in-out infinite;
    }

    @keyframes scan {
      0%, 100% { transform: translateY(0); opacity: 0.2; }
      50% { transform: translateY(100%); opacity: 0.7; }
    }

    /* App Launcher Icon Item */
    .app-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-decoration: none;
      color: inherit;
      cursor: pointer;
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      position: relative;
    }

    .app-icon-wrapper {
      width: 100px;
      height: 100px;
      border-radius: 22px;
      background: rgba(18, 8, 32, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.03);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      margin-bottom: 0.9rem;
      box-shadow: 0 10px 20px rgba(0,0,0,0.3);
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      overflow: hidden;
    }

    .app-icon-wrapper img, .app-icon-wrapper svg {
      width: 80%;
      height: 80%;
      object-fit: contain;
      transition: transform 0.3s ease;
      filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2));
    }

    .app-label {
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--text-secondary);
      transition: color 0.3s ease;
      line-height: 1.3;
      text-align: center;
      word-wrap: break-word;
      max-width: 130px;
    }

    /* Hover States with distinct theme colors */
    .app-card:hover {
      transform: translateY(-8px);
    }

    .app-card:hover .app-icon-wrapper {
      background: rgba(255, 255, 255, 0.05);
      transform: scale(1.05);
    }

    .app-card:hover .app-label {
      color: var(--text-primary);
    }

    /* Custom neon shadows for each card on hover */
    .card-neon-doodle:hover .app-icon-wrapper {
      border-color: var(--accent-pink);
      box-shadow: 0 0 25px rgba(236, 43, 122, 0.35);
    }
    .card-neon-doodle:hover .app-label {
      text-shadow: 0 0 8px rgba(236, 43, 122, 0.4);
    }

    .card-mission-ml:hover .app-icon-wrapper {
      border-color: var(--accent-blue);
      box-shadow: 0 0 25px rgba(0, 210, 255, 0.35);
    }
    .card-mission-ml:hover .app-label {
      text-shadow: 0 0 8px rgba(0, 210, 255, 0.4);
    }

    .card-daily-speak:hover .app-icon-wrapper {
      border-color: #a855f7;
      box-shadow: 0 0 25px rgba(168, 85, 247, 0.35);
    }
    .card-daily-speak:hover .app-label {
      text-shadow: 0 0 8px rgba(168, 85, 247, 0.4);
    }

    .card-water-tracker:hover .app-icon-wrapper {
      border-color: var(--accent-chartreuse);
      box-shadow: 0 0 25px rgba(206, 255, 50, 0.35);
    }
    .card-water-tracker:hover .app-label {
      text-shadow: 0 0 8px rgba(206, 255, 50, 0.4);
    }

    /* Responsive scaling */
    @media (max-width: 768px) {
      .app-dock {
        grid-template-columns: repeat(2, 1fr);
        gap: 2.5rem;
        padding: 2rem;
      }
      .header-section h1 {
        font-size: 2.2rem;
      }
    }

    @media (max-width: 480px) {
      .app-dock {
        grid-template-columns: repeat(2, 1fr);
        gap: 1.5rem;
        padding: 1.5rem 1rem;
        border-radius: 1.5rem;
      }
      .app-icon-wrapper {
        width: 80px;
        height: 80px;
        border-radius: 18px;
        margin-bottom: 0.6rem;
      }
      .app-label {
        font-size: 0.85rem;
      }
      .header-section {
        margin-bottom: 2.5rem;
      }
      .header-section h1 {
        font-size: 1.8rem;
      }
    }
  </style>
</head>
<body>

  <!-- Background components -->
  <div class="bg-grid"></div>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="hub-container">
    <header class="header-section">
      <h1>Dashboard Hub</h1>
      <p>Click any application to launch it instantly</p>
    </header>

    <main class="app-dock">
      <!-- 1. Neon Doodle Tracker -->
      <a href="https://neon-doodle-tracker.vercel.app/" target="_blank" class="app-card card-neon-doodle">
        <div class="app-icon-wrapper">
          <img src="/icon-neon-doodle.png" alt="Neon Doodle Tracker Logo">
        </div>
        <span class="app-label">Neon Doodle Tracker</span>
      </a>

      <!-- 2. Mission ML -->
      <a href="https://mission-ml.vercel.app/" target="_blank" class="app-card card-mission-ml">
        <div class="app-icon-wrapper">
          <img src="/icon-mission-ml.svg" alt="Mission ML Logo">
        </div>
        <span class="app-label">Mission ML</span>
      </a>

      <!-- 3. Daily Speak -->
      <a href="https://daily-speak-pi.vercel.app/" target="_blank" class="app-card card-daily-speak">
        <div class="app-icon-wrapper">
          <img src="/icon-daily-speak.png" alt="Daily Speak Logo">
        </div>
        <span class="app-label">Daily Speak</span>
      </a>

      <!-- 4. Water Tracker -->
      <a href="https://water-tracker-olive.vercel.app/" target="_blank" class="app-card card-water-tracker">
        <div class="app-icon-wrapper">
          <img src="/icon-water-tracker.jpg" alt="Water Tracker Logo">
        </div>
        <span class="app-label">Water Tracker</span>
      </a>
    </main>
  </div>

</body>
</html>
